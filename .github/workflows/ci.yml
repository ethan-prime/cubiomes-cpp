name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCUBIOMES_BUILD_TESTS=ON

      - name: Build library
        run: cmake --build build --config ${{ matrix.build_type }} -j

      - name: Run regression tests
        run: ./build/cubiomes-tests

      - name: Performance smoke checkpoint
        if: matrix.build_type == 'Release'
        run: /usr/bin/time -f "cubiomes-tests elapsed=%e sec" ./build/cubiomes-tests >/dev/null

  c-api-smoke:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCUBIOMES_BUILD_TESTS=OFF

      - name: Build static library
        run: cmake --build build --config Release -j --target cubiomes_static

      - name: Build and run C API smoke
        run: |
          cc -std=c11 -O2 -Wall -Wextra -Werror -I. .github/ci/c_api_smoke.c build/libcubiomes_static.a -lm -pthread -o c-api-smoke
          ./c-api-smoke
