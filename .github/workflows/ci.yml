name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build library
        run: cmake --build build --config Release -j

      - name: Build regression test harness
        run: |
          cc -std=c11 -D_POSIX_C_SOURCE=200809L -O2 -Wall -Wextra -fwrapv -c tests.c
          c++ -O2 -Wall -Wextra -fwrapv -c finders.cpp generator.cpp layers.cpp biomenoise.cpp biomes.cpp noise.cpp util.cpp quadbase.cpp
          c++ tests.o finders.o generator.o layers.o biomenoise.o biomes.o noise.o util.o quadbase.o \
            -lm -pthread -o cubiomes-tests

      - name: Run regression tests
        run: ./cubiomes-tests
