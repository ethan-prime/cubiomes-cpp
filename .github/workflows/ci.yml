name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - build_type: Release
            strict: ON
          - build_type: Debug
            strict: OFF

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCUBIOMES_BUILD_TESTS=ON -DCUBIOMES_STRICT=${{ matrix.strict }}

      - name: Build library
        run: cmake --build build --config ${{ matrix.build_type }} -j

      - name: Run regression tests
        run: |
          ./build/cubiomes-tests
          ./build/cubiomes-cpp-api-tests
          ./build/cubiomes-util-tests

      - name: Performance smoke checkpoint
        if: matrix.build_type == 'Release'
        run: /usr/bin/time -f "cubiomes-tests elapsed=%e sec" ./build/cubiomes-tests >/dev/null

  cpp-api-smoke:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCUBIOMES_BUILD_TESTS=OFF

      - name: Build static library
        run: cmake --build build --config Release -j --target cubiomes_static

      - name: Build and run C++ API smoke
        run: |
          c++ -std=c++23 -O2 -Wall -Wextra -Werror -I. .github/ci/cpp_api_smoke.cpp build/libcubiomes_static.a -lm -pthread -o cpp-api-smoke
          ./cpp-api-smoke

  clang-tidy:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy-18 || sudo apt-get install -y clang-tidy

      - name: Configure CMake (compile commands)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCUBIOMES_BUILD_TESTS=OFF -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          TIDY_BIN=$(command -v clang-tidy-18 || command -v clang-tidy)
          "$TIDY_BIN" --version
          for f in *.cpp; do
            "$TIDY_BIN" -quiet -p build --extra-arg-before=-w "$f"
          done

  pedantic-build:
    runs-on: ubuntu-latest
    needs: [cpp-api-smoke]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake (Pedantic)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCUBIOMES_BUILD_TESTS=ON -DCUBIOMES_STRICT=OFF -DCUBIOMES_PEDANTIC=ON

      - name: Build
        run: cmake --build build --config Release -j

      - name: Run regression tests
        run: |
          ./build/cubiomes-tests
          ./build/cubiomes-cpp-api-tests
          ./build/cubiomes-util-tests

  cmake-consumer-smoke:
    runs-on: ubuntu-latest
    needs: [cpp-api-smoke, clang-tidy]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure install build
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCUBIOMES_BUILD_TESTS=OFF -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/stage

      - name: Build and install package
        run: |
          cmake --build build --config Release -j
          cmake --install build

      - name: Configure CMake consumer
        run: cmake -S .github/ci/consumer-cmake -B consumer-build -DCMAKE_PREFIX_PATH=${{ github.workspace }}/stage

      - name: Build and run consumers
        run: |
          cmake --build consumer-build -j
          ./consumer-build/consumer_cpp
          ./consumer-build/consumer_cpp_api
