name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build library
        run: cmake --build build --config Release -j

      - name: Build regression test harness
        run: |
          cc -std=c11 -O2 -Wall -Wextra -fwrapv \
            tests.c finders.c generator.c layers.c biomenoise.c biomes.c noise.c util.c quadbase.c \
            -lm -pthread -o cubiomes-tests

      - name: Run regression tests
        run: ./cubiomes-tests
